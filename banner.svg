<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="480" viewBox="0 0 1600 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0b1f38"/>
      <stop offset="100%" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2f81f7"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="480" fill="url(#bg)"/>
  <g opacity="0.28" stroke="#58a6ff" stroke-width="2">
    <path d="M100 360 L300 210 L500 330 L720 150 L950 300 L1210 120 L1480 260" fill="none"/>
    <path d="M120 130 L380 260 L650 90 L910 210 L1160 330 L1440 150" fill="none"/>
  </g>
  <g fill="#58a6ff" filter="url(#glow)">
    <circle cx="100" cy="360" r="7"/><circle cx="300" cy="210" r="7"/>
    <circle cx="500" cy="330" r="7"/><circle cx="720" cy="150" r="7"/>
    <circle cx="950" cy="300" r="7"/><circle cx="1210" cy="120" r="7"/>
    <circle cx="1480" cy="260" r="7"/><circle cx="120" cy="130" r="6"/>
    <circle cx="380" cy="260" r="6"/><circle cx="650" cy="90" r="6"/>
    <circle cx="910" cy="210" r="6"/><circle cx="1160" cy="330" r="6"/>
    <circle cx="1440" cy="150" r="6"/>
  </g>
  <rect x="90" y="85" width="12" height="250" rx="6" fill="url(#accent)"/>
  <text x="145" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="800" fill="#ffffff">
    MOHAMMED SHUJAD
  </text>
  <text x="150" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="600" fill="#58a6ff">
